<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Circle background -->
  <circle cx="100" cy="100" r="95" fill="#D4A574" opacity="0.9"/>
  <circle cx="100" cy="100" r="95" fill="url(#soilGradient)" opacity="0.95"/>

  <!-- Soil texture -->
  <defs>
    <radialGradient id="soilGradient" cx="50%" cy="70%">
      <stop offset="0%" style="stop-color:#E8D4B8;stop-opacity:1" />
      <stop offset="60%" style="stop-color:#D4A574;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B6F47;stop-opacity:1" />
    </radialGradient>
    <linearGradient id="leafGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6BBD6F;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5AA45F;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Soil mound -->
  <ellipse cx="100" cy="110" rx="75" ry="50" fill="#9D8B7E" opacity="0.4"/>
  <path d="M 40 100 Q 35 115 40 125 Q 50 140 100 145 Q 150 140 160 125 Q 165 115 160 100" fill="#8B7355" opacity="0.3"/>

  <!-- Main stem -->
  <line x1="100" y1="145" x2="100" y2="60" stroke="#7AA86B" stroke-width="3" stroke-linecap="round"/>

  <!-- Left leaf -->
  <ellipse cx="85" cy="85" rx="12" ry="22" fill="url(#leafGradient)" opacity="0.95" transform="rotate(-35 85 85)"/>
  <line x1="100" y1="85" x2="85" y2="85" stroke="#6BBD6F" stroke-width="1.5" opacity="0.6"/>

  <!-- Right leaf -->
  <ellipse cx="115" cy="85" rx="12" ry="22" fill="url(#leafGradient)" opacity="0.95" transform="rotate(35 115 85)"/>
  <line x1="100" y1="85" x2="115" y2="85" stroke="#6BBD6F" stroke-width="1.5" opacity="0.6"/>

  <!-- Top leaf cluster -->
  <ellipse cx="100" cy="50" rx="10" ry="18" fill="url(#leafGradient)" opacity="0.95"/>
  <ellipse cx="92" cy="55" rx="8" ry="16" fill="#5AA45F" opacity="0.8" transform="rotate(-25 92 55)"/>
  <ellipse cx="108" cy="55" rx="8" ry="16" fill="#5AA45F" opacity="0.8" transform="rotate(25 108 55)"/>

  <!-- Circle border -->
  <circle cx="100" cy="100" r="95" fill="none" stroke="#8B6F47" stroke-width="2" opacity="0.4"/>
</svg>
